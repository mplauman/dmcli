name: Build and Release

# Builds release artifacts for every push to main (to verify releasability)
# and publishes a GitHub Release when a version tag is pushed.
#
# Requires the CI workflow to have passed before a release is created; enforce
# this via a branch-protection rule that requires the "CI" workflow status check.

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: cli
            archive: tar.gz
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: cli
            archive: tar.gz
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: cli
            archive: tar.gz
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: cli
            archive: tar.gz
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: cli.exe
            archive: zip
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/dmcli-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.binary }}

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath dist/dmcli-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmcli-${{ matrix.target }}
          path: dist/dmcli-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
